name: Flutter Web Build Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Repository se code checkout karega
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Java environment setup (Flutter tooling ke liye)
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    # 3. Flutter SDK setup (Stable version)
    - name: Setup Flutter SDK
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true

    # 4. Flutter dependencies fetch karega
    - name: Install Dependencies
      run: flutter pub get

    # 5. Code analysis check karega
    - name: Run Flutter Analyze
      run: flutter analyze

    # 6. Flutter Web Release Build Test karega (Dummy Dart-Define values ke sath)
    - name: Build Flutter Web
      run: |
        flutter build web --release \
          --dart-define=API_BASE_URL=https://api.arvindparty.com \
          --dart-define=FIREBASE_API_KEY=test_api_key \
          --dart-define=FIREBASE_AUTH_DOMAIN=test.firebaseapp.com \
          --dart-define=FIREBASE_PROJECT_ID=arvind-party-test \
          --dart-define=FIREBASE_STORAGE_BUCKET=test.appspot.com \
          --dart-define=FIREBASE_MESSAGING_SENDER_ID=123456789 \
          --dart-define=FIREBASE_APP_ID=1:123456789:web:abcdef \
          --dart-define=LIVEKIT_URL=wss://test.livekit.cloud \
          --dart-define=RAZORPAY_KEY_ID=rzp_test_12345
          
